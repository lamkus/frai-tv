name: Sync YouTube Videos (AI)

on:
  # Run daily at 3 AM UTC
  schedule:
    - cron: '0 3 * * *'
  
  # Allow manual trigger
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: code/frontend/package-lock.json
      
      - name: Install dependencies
        working-directory: code/frontend
        run: npm ci
      
      - name: Run AI video sync
        working-directory: code/frontend
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          YOUTUBE_CHANNEL_ID: ${{ secrets.YOUTUBE_CHANNEL_ID }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: npm run yt:sync-ai
      
      - name: Check for changes
        id: changes
        run: |
          if [[ -n $(git status --porcelain code/frontend/public/data/videos.json) ]]; then
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "✅ New videos detected"
          else
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "ℹ️ No new videos"
          fi
      
      - name: Commit and push changes
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add code/frontend/public/data/videos.json
          git commit -m "🤖 Auto-sync: Update videos.json with AI categorization [skip ci]"
          git push
      
      - name: Build frontend
        if: steps.changes.outputs.changed == 'true'
        working-directory: code/frontend
        run: npm run build
      
      - name: Deploy to Checkdomain
        if: steps.changes.outputs.changed == 'true'
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.CHECKDOMAIN_FTP_HOST }}
          username: ${{ secrets.CHECKDOMAIN_FTP_USER }}
          password: ${{ secrets.CHECKDOMAIN_FTP_PASSWORD }}
          local-dir: ./code/frontend/dist/
          server-dir: ./
          dangerous-clean-slate: false
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
      
      - name: Notify on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '🚨 YouTube AI Sync Failed',
              body: `The automated YouTube video sync workflow failed on ${new Date().toISOString()}.\n\nPlease check the [workflow run](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}) for details.`,
              labels: ['bug', 'automation']
            })
