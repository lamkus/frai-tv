name: YouTube Sync

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install
        working-directory: code/frontend
        run: npm ci

      - name: Run YouTube sync script
        working-directory: code/frontend
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          CHANNEL_ID: ${{ secrets.YOUTUBE_CHANNEL_ID }}
        run: |
          node ./scripts/sync-youtube-auto.mjs

      - name: Commit changes
        working-directory: code/frontend
        run: |
          git config --global user.name 'GitHub Actions'
          git config --global user.email 'actions@github.com'
          git add public/data/videos.json public/data/sync.log || true
          git diff --staged --quiet || (git commit -m "🤖 Auto-sync YouTube videos [skip ci]" && git push)
