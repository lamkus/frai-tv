<!DOCTYPE html>
<html lang="de" class="dark">
  <head>
    <meta charset="UTF-8" />

    <!-- Open Graph / Social Sharing -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="frai.tv" />
    <meta property="og:title" content="frai.tv - FREE AI Enhanced TV | Classic Films & Cartoons in 8K" />
    <meta property="og:description" content="Stream 400+ AI-restored classic cartoons, vintage films & WWII newsreels in stunning 8K. Betty Boop, Superman, Felix the Cat, Deutsche Wochenschau & more. Free for everyone." />
    <meta property="og:url" content="https://frai.tv" />
    <meta property="og:image" content="https://frai.tv/icons/og-image.png" />
    <meta property="og:locale" content="de_DE" />
    <meta property="og:locale:alternate" content="en_US" />
    <meta property="og:locale:alternate" content="ja_JP" />
    <meta property="og:locale:alternate" content="fr_FR" />
    <meta property="og:locale:alternate" content="es_ES" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="frai.tv - FREE AI Enhanced TV" />
    <meta name="twitter:description" content="400+ classic films & cartoons restored in 8K. Free streaming." />
    <meta name="twitter:image" content="https://frai.tv/icons/og-image.png" />

    <!-- Canonical -->
    <link rel="canonical" href="https://frai.tv" />

    <!-- Preconnect to YouTube (thumbnails) -->
    <link rel="dns-prefetch" href="https://img.youtube.com" />
    <link rel="preconnect" href="https://img.youtube.com" crossorigin />

    <!-- Schema.org Organization -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "remAIke",
      "alternateName": "remAIke_IT",
      "url": "https://frai.tv",
      "logo": "https://frai.tv/icons/icon-512.png",
      "sameAs": [
        "https://www.youtube.com/@remAIke_IT",
        "https://www.instagram.com/remaike_it/",
        "https://www.tiktok.com/@remaike_it"
      ],
      "description": "AI-restored classic films, vintage cartoons & historic newsreels in 8K quality"
    }
    </script>

    <!-- Schema.org WebSite (enables Google Sitelinks Search) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "frai.tv",
      "alternateName": "FREE AI Enhanced TV",
      "url": "https://frai.tv",
      "potentialAction": {
        "@type": "SearchAction",
        "target": "https://frai.tv/search?q={search_term_string}",
        "query-input": "required name=search_term_string"
      }
    }
    </script>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0a0a0a" />
    <meta
      name="description"
      content="frai.tv - 400+ AI-restored classic cartoons, vintage films & WWII newsreels in 8K. Betty Boop, Superman, Felix the Cat, Deutsche Wochenschau. Free streaming."
    />

    <!-- PWA Meta Tags -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="frai.tv" />
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />
    <link rel="apple-touch-icon" sizes="192x192" href="/icons/icon-192.png" />

    <!-- Microsoft Tiles -->
    <meta name="msapplication-TileColor" content="#0a0a0a" />
    <meta name="msapplication-TileImage" content="/icons/icon-192.png" />

    <!-- Preconnect to Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- Fonts: Inter (UI), Bebas Neue (Display) -->
    <link
      href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <title>frai.tv - FREE AI Enhanced TV</title>
  </head>
  <body class="bg-retro-black text-retro-white antialiased">
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <!-- Google Identity Services (optional) -->
    <script src="https://accounts.google.com/gsi/client" async defer></script>

    <!-- Service Worker Registration -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker
            .register('/sw.js')
            .then((registration) => {
              console.log('SW registered:', registration.scope);
            })
            .catch((error) => {
              console.log('SW registration failed:', error);
            });
        });
      }
    </script>
  </body>
</html>
